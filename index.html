<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Horta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
    <input type="text" id="globalSearch" placeholder="🔎 Pesquisar..." onkeyup="filtrarTudo()">
</header>

<main>
    <section id="page-horta" class="page active">
        <div class="flex-header">
            <h2>🌿 Minhas Plantas</h2>
            <button class="btn-main" onclick="abrirModal('modal-planta')">+ Plantar</button>
        </div>
        <div id="lista-plantas"></div>
    </section>

    <section id="page-calendario" class="page">
        <h2>📅 Previsão de Colheita</h2>
        <div id="calendario-render"></div>
    </section>

    <section id="page-wiki" class="page">
        <div class="flex-header">
            <h2>📖 Notas</h2>
            <button class="btn-main" onclick="abrirModal('modal-wiki')">+ Nota</button>
        </div>
        <div id="wiki-render"></div>
    </section>

    <section id="page-config" class="page">
        <h2>⚙️ Configurações</h2>
        <div class="card">
            <h3>🏡 Gerir Zonas</h3>
            <div class="flex">
                <input type="text" id="z-nome" placeholder="Ex: Estufa, Varanda...">
                <button class="btn-main" onclick="addZona()">Criar</button>
            </div>
            <div id="lista-zonas" style="margin-top:15px"></div>
        </div>
        <div class="card">
            <h3>💾 Segurança</h3>
            <button class="btn-secondary" onclick="exportarBackup()">Exportar Backup (.json)</button>
            <input type="file" id="importFile" accept=".json" onchange="importarBackup(event)" style="display:none">
            <button class="btn-secondary" onclick="document.getElementById('importFile').click()" style="margin-top:10px">Importar Backup</button>
        </div>
    </section>
</main>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="irPara('horta', this)">🌿<span>Horta</span></button>
    <button class="nav-item" onclick="irPara('calendario', this)">📅<span>Colheita</span></button>
    <button class="nav-item" onclick="irPara('notas', this)">📖<span>Notas</span></button>
    <button class="nav-item" onclick="irPara('config', this)">⚙️<span>Config</span></button>
</nav>

<div id="modal-planta" class="modal">
    <div class="modal-content">
        <h3>🌱 Plantar</h3>
        <input type="text" id="p-nome" placeholder="Nome da Planta">
        <select id="p-zona-id"></select>
        <input type="date" id="p-data" title="Data de Plantio" placeholder="Data">
        <input type="number" id="p-ciclo" placeholder="Dias até colher (ex: 90)">
        <input type="file" id="p-foto" accept="image/*" capture="environment">
        <textarea id="p-notas" placeholder="Anotações..."></textarea>
        <div class="flex">
            <button class="btn-cancel" onclick="fecharModal('modal-planta')">Cancelar</button>
            <button class="btn-main" onclick="salvarPlanta()">Salvar</button>
        </div>
    </div>
</div>

<div id="modal-wiki" class="modal">
    <div class="modal-content">
        <h3>💡 Adicionar Nota/Dica</h3>
        <input type="text" id="w-titulo" placeholder="Título">
        <textarea id="w-texto" placeholder="Explicação detalhada..."></textarea>
        <div class="flex">
            <button class="btn-cancel" onclick="fecharModal('modal-wiki')">Cancelar</button>
            <button class="btn-main" onclick="salvarWiki()">Guardar</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js');
        });
    }
</script>
</body>
</html>
