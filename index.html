<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horta Pro Max</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --p: #2e7d32; --s: #f1f8e9; --danger: #c62828; --grey: #607d8b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fafafa; margin: 0; padding-bottom: 90px; color: #2c3e50; }
        
        /* Barra de Pesquisa Fixa */
        .search-container { position: sticky; top: 0; background: white; padding: 10px 15px; z-index: 500; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .search-bar { width: 100%; padding: 10px 40px 10px 15px; border: 2px solid var(--s); border-radius: 25px; box-sizing: border-box; font-size: 16px; outline: none; }
        .search-bar:focus { border-color: var(--p); }

        /* Navegação Inferior */
        .navbar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-btn { flex: 1; border: none; background: none; text-align: center; color: #95a5a6; cursor: pointer; font-size: 0.8em; }
        .nav-btn.active { color: var(--p); font-weight: bold; }

        .page { display: none; padding: 15px; max-width: 650px; margin: auto; }
        .active-page { display: block; }

        /* Cards Estilizados */
        .card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; position: relative; }
        .img-header { width: 100%; height: 160px; background: #e0e0e0; object-fit: cover; }
        .card-body { padding: 20px; }
        
        /* Badges e Infos */
        .badge-idade { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 5px 12px; border-radius: 15px; font-size: 0.75em; }
        .status-tag { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .status-germinar { background: #fff3e0; color: #ef6c00; }
        .status-crescer { background: #e8f5e9; color: #2e7d32; }
        .status-colher { background: #fbe9e7; color: #d84315; }

        /* Botões e Inputs */
        .input-group { background: var(--s); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #dcdde1; border-radius: 10px; box-sizing: border-box; }
        .btn-main { background: var(--p); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-rega { background: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; }
        .btn-del { color: var(--danger); background: none; border: none; font-size: 0.8em; cursor: pointer; float: right; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="globalSearch" class="search-bar" placeholder="🔎 Pesquisar plantas ou dicas..." onkeyup="filtrarTudo()">
    </div>

    <div id="page-horta" class="page active-page">
        <h2>🌱 O Meu Jardim</h2>
        <div class="input-group">
            <strong>Adicionar Planta</strong>
            <input type="text" id="p-nome" placeholder="Nome da Planta">
            <select id="p-status">
                <option value="Germinar">🌱 Germinação</option>
                <option value="Crescer" selected>🌿 Crescimento</option>
                <option value="Colher">🧺 Colheita</option>
            </select>
            <input type="date" id="p-data" title="Data de Plantio">
            <input type="file" id="p-foto" accept="image/*" capture="environment">
            <textarea id="p-notas" placeholder="Anotações extras..."></textarea>
            <button class="btn-main" onclick="addPlanta()">Registar</button>
        </div>
        <div id="lista-plantas"></div>
    </div>

    <div id="page-dicas" class="page">
        <h2>💡 Wiki & Truques</h2>
        <div class="input-group">
            <strong>Novo Truque</strong>
            <input type="text" id="d-titulo" placeholder="Título">
            <textarea id="d-texto" placeholder="Conteúdo da dica..."></textarea>
            <button class="btn-main" onclick="addDica()">Guardar na Wiki</button>
        </div>
        <div id="lista-dicas"></div>
    </div>

    <nav class="navbar">
        <button class="nav-btn active" id="nav-horta" onclick="irPara('horta')">🌿<br>Plantas</button>
        <button class="nav-btn" id="nav-dicas" onclick="irPara('dicas')">💡<br>Dicas</button>
    </nav>

<script>
    // BANCO DE DADOS
    const db = new Dexie("HortaFinalDB");
    db.version(1).stores({
        plantas: '++id, nome, status, data, notas, foto, ultimaRega',
        dicas: '++id, titulo, texto'
    });

    // NAVEGAÇÃO
    function irPara(pg) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-'+pg).classList.add('active-page');
        document.getElementById('nav-'+pg).classList.add('active');
        document.getElementById('globalSearch').value = ""; // Limpa pesquisa ao trocar aba
        filtrarTudo();
    }

    // CALCULAR IDADE
    function calcularIdade(dataPlantio) {
        if(!dataPlantio) return "Data desconhecida";
        const hoje = new Date();
        const plantio = new Date(dataPlantio);
        const diff = Math.floor((hoje - plantio) / (1000 * 60 * 60 * 24));
        return diff < 0 ? "Futuro" : diff === 0 ? "Plantada hoje" : diff + " dias de vida";
    }

    // PESQUISA / FILTRO
    function filtrarTudo() {
        const termo = document.getElementById('globalSearch').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const texto = card.innerText.toLowerCase();
            card.style.display = texto.includes(termo) ? "block" : "none";
        });
    }

    // LÓGICA PLANTAS
    async function addPlanta() {
        const nome = document.getElementById('p-nome').value;
        const data = document.getElementById('p-data').value || new Date().toISOString().split('T')[0];
        if(!nome) return alert("Nome é obrigatório");

        await db.plantas.add({
            nome,
            status: document.getElementById('p-status').value,
            data,
            notas: document.getElementById('p-notas').value,
            foto: document.getElementById('p-foto').files[0] || null,
            ultimaRega: new Date().toLocaleDateString('pt-PT')
        });
        location.reload();
    }

    async function renderHorta() {
        const plantas = await db.plantas.toArray();
        const container = document.getElementById('lista-plantas');
        
        container.innerHTML = plantas.map(p => `
            <div class="card">
                <span class="badge-idade">${calcularIdade(p.data)}</span>
                ${p.foto ? `<img src="${URL.createObjectURL(p.foto)}" class="img-header">` : `<div class="img-header" style="background:#ddd; display:flex; align-items:center; justify-content:center">Sem Foto</div>`}
                <div class="card-body">
                    <button class="btn-del" onclick="apagar('plantas', ${p.id})">🗑️ Apagar</button>
                    <span class="status-tag status-${p.status.toLowerCase()}">${p.status}</span>
                    <h3 style="margin:5px 0">${p.nome}</h3>
                    <p style="font-size:0.85em; color:#7f8c8d">${p.notas || ''}</p>
                    <small>💧 Última rega: ${p.ultimaRega}</small>
                    <button class="btn-rega" onclick="regar(${p.id})">MARCAR REGA</button>
                </div>
            </div>
        `).reverse().join('');
    }

    // LÓGICA DICAS
    async function addDica() {
        const titulo = document.getElementById('d-titulo').value;
        const texto = document.getElementById('d-texto').value;
        if(!titulo || !texto) return alert("Preencha título e texto");
        await db.dicas.add({titulo, texto});
        document.getElementById('d-titulo').value = "";
        document.getElementById('d-texto').value = "";
        renderDicas();
    }

    async function renderDicas() {
        const dicas = await db.dicas.toArray();
        const container = document.getElementById('lista-dicas');
        container.innerHTML = dicas.map(d => `
            <div class="card card-body">
                <button class="btn-del" onclick="apagar('dicas', ${d.id})">🗑️</button>
                <h4 style="margin:0 0 10px 0; color:var(--p)">💡 ${d.titulo}</h4>
                <p style="font-size:0.9em; margin:0">${d.texto}</p>
            </div>
        `).reverse().join('');
    }

    async function regar(id) {
        await db.plantas.update(id, { ultimaRega: new Date().toLocaleDateString('pt-PT') });
        renderHorta();
    }

    async function apagar(tab, id) {
        if(confirm("Deseja eliminar este item?")) {
            await db[tab].delete(id);
            tab === 'plantas' ? renderHorta() : renderDicas();
        }
    }

    db.open().then(() => { renderHorta(); renderDicas(); });
</script>
</body>
</html>
