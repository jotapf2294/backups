<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horta Inteligente</title>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <style>
        :root { --p: #2e7d32; --s: #edf7ed; --t: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f0; color: var(--t); margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { text-align: center; color: var(--p); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; display: block; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add { background: var(--p); color: white; }
        .btn-rega { background: #2196f3; color: white; margin-top: 10px; width: auto; padding: 8px 15px; }
        .btn-delete { background: #ff5252; color: white; width: auto; float: right; padding: 5px 10px; font-size: 12px; }
        .planta-card { border-left: 5px solid var(--p); }
        .notas-txt { background: var(--s); padding: 10px; border-radius: 5px; font-size: 0.9em; margin-top: 10px; white-space: pre-wrap; }
        .data { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 Minha Horta</h1>

    <div class="card">
        <strong>Nova Planta</strong>
        <input type="text" id="nome" placeholder="Nome (ex: Tomateiro)">
        <textarea id="notas" placeholder="Anotações (ex: Solo rico em matéria orgânica, pegar sol da manhã)"></textarea>
        <button class="btn-add" onclick="salvar()">Adicionar Planta</button>
    </div>

    <div id="lista"></div>
</div>

<script>
    // Configuração do Banco de Dados
    const db = new Dexie("HortaLocalDB");
    db.version(1).stores({
        plantas: '++id, nome, notas, ultimaRega'
    });

    // Abrir o banco e carregar dados
    db.open().then(carregarPlantas).catch(err => {
        console.error("Erro ao abrir banco: " + err);
        alert("Erro ao iniciar banco de dados. Tente usar um servidor local (Live Server).");
    });

    async function salvar() {
        const nome = document.getElementById('nome').value;
        const notas = document.getElementById('notas').value;

        if(!nome) return alert("Dê um nome à planta!");

        try {
            await db.plantas.add({
                nome: nome,
                notas: notas,
                ultimaRega: new Date().toLocaleString('pt-PT')
            });
            document.getElementById('nome').value = '';
            document.getElementById('notas').value = '';
            carregarPlantas();
        } catch (e) {
            alert("Erro ao salvar: " + e);
        }
    }

    async function carregarPlantas() {
        const listaDiv = document.getElementById('lista');
        const todas = await db.plantas.toArray();
        
        listaDiv.innerHTML = todas.map(p => `
            <div class="card planta-card">
                <button class="btn-delete" onclick="apagar(${p.id})">Remover</button>
                <strong>${p.nome}</strong>
                <div class="data">Última rega: ${p.ultimaRega}</div>
                ${p.notas ? `<div class="notas-txt"><strong>Notas:</strong><br>${p.notas}</div>` : ''}
                <button class="btn-rega" onclick="regar(${p.id})">💧 Marcar Rega</button>
            </div>
        `).reverse().join('');
    }

    async function regar(id) {
        await db.plantas.update(id, { ultimaRega: new Date().toLocaleString('pt-PT') });
        carregarPlantas();
    }

    async function apagar(id) {
        if(confirm("Deseja remover esta planta?")) {
            await db.plantas.delete(id);
            carregarPlantas();
        }
    }
</script>
</body>
</html>
